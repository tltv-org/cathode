# Channel config — example
#
# On first start, cathode copies this to channel-one.yaml.
# Edit the copy to customize your channel. Metadata changes
# (display_name, description, tags, etc.) can also be made at
# runtime via PATCH /api/channel — persisted back to this file.
#
# Multi-channel: add more YAML files here. Each gets its own
# engine, identity, and federation presence.

id: channel-one
display_name: "Channel One"
timezone: "UTC"
playlist_loop: true
day_start: "00:00:00"

# Identity (federation — Ed25519 keypair generated on first start)
identity:
  private_key_path: "/data/keys/channel-one.key"
  description: ""
  language: "en"
  tags: []
  access: "public"     # "public" or "private"
  origins: []          # Public hostnames for federation hints

# Output — HLS served directly via hlssink2.
# Additional outputs (RTMP, recording) added at runtime via /api/outputs.
output:
  type: "hls"

# Media paths
media:
  base_dir: "/media"
  program_dir: "/data/programs"

# Failover — safety layer (layer 0), loops under all live content.
# Auto-generated on first boot.  Customize and call
# POST /api/playout/failover/regenerate to apply.
failover:
  title: ""              # defaults to display_name
  subtitle: ""
  duration: 60           # seconds
  pattern: "smpte"       # GStreamer videotestsrc pattern

# Slate — default content on input_a when no playlist is active.
# Auto-generated on first boot.  Customize and call
# POST /api/playout/slate/regenerate to apply.
slate:
  title: ""              # defaults to display_name
  subtitle: "No content scheduled"
  duration: 300
  pattern: "black"
